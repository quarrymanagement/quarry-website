# ---------------------------------------------------------------------------
# Headers — keep CMS / admin / staging surfaces out of search engines
# Reinforces robots.txt + per-page <meta name="robots"> noindex
# ---------------------------------------------------------------------------
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/about.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/employee/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

[[headers]]
  for = "/netlify/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive"

# Block the *.netlify.app preview subdomain from being indexed entirely.
# (Production thequarrystl.com is unaffected — Netlify only sends this header
#  on the deploy-preview / branch-deploy hostnames.)
[[context.deploy-preview.headers]]
  for = "/*"
  [context.deploy-preview.headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[context.branch-deploy.headers]]
  for = "/*"
  [context.branch-deploy.headers.values]
    X-Robots-Tag = "noindex, nofollow"
