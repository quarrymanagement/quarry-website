# ============================================================================
# Netlify config for The Quarry portal
#
# Scheduled functions are configured INSIDE each function file via
# `exports.config = { schedule: "..." }` — see marketing-generate-daily.js,
# marketing-send.js, and marketing-optimize.js. This file is intentionally
# minimal so we don't override Netlify's auto-detected publish/build settings.
# ============================================================================

[functions]
  directory = "netlify/functions"
