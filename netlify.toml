# ============================================================================
# Netlify config — schedules only.
# Build command auto-detected (build.sh runs by Netlify convention).
# Functions live at netlify/functions, deps in root package.json.
# ============================================================================

[build]
  command = "bash build.sh"
  publish = "."

[functions]
  directory = "netlify/functions"

# ----------------------------------------------------------------------------
# Scheduled functions (cron syntax = UTC)
# CDT = UTC-5, CST = UTC-6 — pick a UTC time that's reasonable in both.
# ----------------------------------------------------------------------------

# Daily marketing draft generator — 12:00 UTC = 7am CDT / 6am CST.
[functions."marketing-generate-daily"]
  schedule = "0 12 * * *"

# Send-queue poller — every 10 min. Drains 'approved' drafts at scheduledFor.
[functions."marketing-send"]
  schedule = "*/10 * * * *"

# Nightly AI optimizer — 7:00 UTC = 2am CDT / 1am CST. Quiet time.
[functions."marketing-optimize"]
  schedule = "0 7 * * *"

# Stats poller — every 15 min. Replaces the SendGrid event webhook (not
# included on Basic 5k plan). Pulls open/click/bounce stats per Single Send.
[functions."marketing-poll-stats"]
  schedule = "*/15 * * * *"

# ─── SOCIAL ──────────────────────────────────────────────────────────────────
# Daily social drafts generator — 13:00 UTC = 8am CDT / 7am CST.
[functions."social-generate-daily"]
  schedule = "0 13 * * *"

# Social send-queue poller — every 10 min. Drains 'approved' drafts at scheduledFor.
[functions."social-post"]
  schedule = "*/10 * * * *"

# Social engagement stats poller — every 30 min. Reach/likes/comments per post.
[functions."social-poll-stats"]
  schedule = "*/30 * * * *"

# Cadence engine — every 4 hours. Picks up newly added events/bands and
# rebuilds skeleton drafts; re-prioritizes when new high-priority items appear.
# Light operation (no AI calls), idempotent.
[functions."social-cadence-engine"]
  schedule = "0 */4 * * *"

# Nightly social learning optimizer — 8:00 UTC = 3am CT.
# Mines engagement patterns into social_learnings.json so future captions improve.
[functions."social-optimize"]
  schedule = "0 8 * * *"

# Weather-aware atmosphere posts — 11:00 UTC = 6am CT. Reads forecast and
# creates patio-perfect or cozy-fireside skeleton drafts for today/tomorrow.
[functions."social-weather-trigger"]
  schedule = "0 11 * * *"

