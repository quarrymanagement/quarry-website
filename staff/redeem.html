<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Quarry · Redeem</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1A1A1A; --card: #232323; --elev: #2A2520;
    --border: rgba(196,149,106,0.22); --gold: #B8933A; --gold-light: #D4AF6A;
    --cream: #F5F0E8; --text-muted: rgba(245,240,232,0.55); --text-dim: rgba(245,240,232,0.35);
    --green: #6FBF73; --green-bg: rgba(111,191,115,0.12);
    --red: #DC2626; --red-bg: rgba(220,38,38,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--cream);
    font-family: 'Montserrat', -apple-system, sans-serif;
    min-height: 100vh; padding: 24px 16px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 460px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 24px; }
  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--cream); margin-bottom: 4px;
  }
  .sub {
    font-size: 0.7rem; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--gold-light);
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px; margin-bottom: 16px;
  }
  .field { margin-bottom: 14px; }
  label {
    display: block;
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--gold-light); margin-bottom: 6px;
  }
  input {
    width: 100%; padding: 14px 16px;
    background: var(--elev); border: 1px solid var(--border);
    border-radius: 6px; color: var(--cream);
    font-size: 1rem; font-family: inherit;
  }
  input.code-input {
    text-align: center;
    font-size: 2rem; font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-family: 'Playfair Display', serif;
  }
  input:focus {
    outline: none; border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,147,58,0.15);
  }
  .btn {
    width: 100%;
    background: var(--gold); color: var(--bg);
    font-family: inherit; font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase;
    border: none; border-radius: 8px;
    padding: 18px; cursor: pointer;
    transition: background 0.15s;
  }
  .btn:hover { background: var(--gold-light); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .result {
    margin-top: 16px; padding: 24px;
    border-radius: 12px;
    border: 1px solid;
    text-align: center;
  }
  .result.ok { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .result.err { background: var(--red-bg); border-color: var(--red); color: var(--red); }
  .result-icon { font-size: 2rem; margin-bottom: 12px; }
  .result-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: var(--cream); margin-bottom: 6px; }
  .result-detail { font-size: 0.95rem; color: var(--text-muted); }
  .result-meta { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-dim); }
  .footer { text-align: center; margin-top: 32px; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.06em; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">The Quarry</div>
    <div class="sub">Reward Redemption</div>
  </div>

  <div class="card">
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>
    <div class="field">
      <label>Member's Code</label>
      <input class="code-input" id="code" maxlength="6" placeholder="ABC123" autocomplete="off" autocapitalize="characters">
    </div>
    <button class="btn" id="redeemBtn" onclick="redeem()">Apply Reward</button>
  </div>

  <div id="result"></div>

  <div class="footer">
    Member shows their 6-character code from the app. Codes expire in 5 minutes.
  </div>
</div>

<script>
function $(id) { return document.getElementById(id); }
function escHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

async function redeem() {
  const btn = $('redeemBtn');
  const result = $('result');
  const password = $('password').value.trim();
  const code = $('code').value.trim().toUpperCase();

  if (!password || code.length !== 6) {
    result.innerHTML = '<div class="result err"><div class="result-icon">!</div><div class="result-name">Missing input</div><div class="result-detail">Enter the password and 6-character code.</div></div>';
    return;
  }

  btn.disabled = true; btn.textContent = 'Working…';
  result.innerHTML = '';

  try {
    const r = await fetch('/.netlify/functions/redeem-claim', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword: password, code: code }),
    });
    const body = await r.json();

    if (!r.ok || !body.ok) {
      result.innerHTML =
        '<div class="result err">' +
          '<div class="result-icon">✕</div>' +
          '<div class="result-name">' + escHtml(body.error || ('HTTP ' + r.status)) + '</div>' +
        '</div>';
      return;
    }

    result.innerHTML =
      '<div class="result ok">' +
        '<div class="result-icon">✓</div>' +
        '<div class="result-name">' + escHtml(body.reward.name) + '</div>' +
        '<div class="result-detail">Honor for <strong>' + escHtml(body.member.name || body.member.email) + '</strong></div>' +
        '<div class="result-meta">−' + body.reward.points + ' pts · new balance ' + body.newBalance.toLocaleString() + '</div>' +
      '</div>';

    // Clear code, keep password for the next redemption
    $('code').value = '';
    $('code').focus();
  } catch (err) {
    result.innerHTML = '<div class="result err"><div class="result-icon">✕</div><div class="result-name">Network error</div><div class="result-detail">' + escHtml(err.message) + '</div></div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Apply Reward';
  }
}

// Auto-uppercase the code as user types
$('code').addEventListener('input', (e) => { e.target.value = e.target.value.toUpperCase(); });

// Submit on Enter
document.querySelectorAll('input').forEach(el => {
  el.addEventListener('keydown', e => { if (e.key === 'Enter') redeem(); });
});
</script>
</body>
</html>
