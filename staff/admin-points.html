<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Quarry · Adjust Points</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1A1A1A; --card: #232323; --elev: #2A2520;
    --border: rgba(196,149,106,0.22); --gold: #B8933A; --gold-light: #D4AF6A;
    --cream: #F5F0E8; --text-muted: rgba(245,240,232,0.55); --text-dim: rgba(245,240,232,0.35);
    --green: #6FBF73; --green-bg: rgba(111,191,115,0.12);
    --red: #DC2626; --red-bg: rgba(220,38,38,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--cream); font-family: 'Montserrat', sans-serif; min-height: 100vh; padding: 24px 16px; }
  .wrap { max-width: 460px; margin: 0 auto; }
  .header { text-align: center; margin-bottom: 24px; }
  .brand { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--cream); margin-bottom: 4px; }
  .sub { font-size: 0.7rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--gold-light); }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }
  .field { margin-bottom: 14px; }
  label { display: block; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 6px; }
  input, textarea { width: 100%; padding: 14px 16px; background: var(--elev); border: 1px solid var(--border); border-radius: 6px; color: var(--cream); font-size: 1rem; font-family: inherit; }
  input:focus, textarea:focus { outline: none; border-color: var(--gold); }
  textarea { resize: vertical; min-height: 70px; }
  .delta-row { display: flex; gap: 8px; }
  .delta-row .preset {
    flex: 1; padding: 10px 4px; background: var(--elev);
    border: 1px solid var(--border); border-radius: 6px;
    color: var(--gold-light); font-family: inherit; font-size: 0.78rem;
    font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase;
    cursor: pointer;
  }
  .delta-row .preset:hover { background: rgba(184,147,58,0.1); border-color: var(--gold); }
  .delta-row .preset.neg { color: #fca5a5; }
  .btn { width: 100%; background: var(--gold); color: var(--bg); font-family: inherit; font-size: 0.95rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; border: none; border-radius: 8px; padding: 18px; cursor: pointer; margin-top: 8px; }
  .btn:hover { background: var(--gold-light); }
  .btn:disabled { opacity: 0.5; cursor: wait; }
  .result { margin-top: 16px; padding: 18px; border-radius: 10px; border: 1px solid; text-align: center; }
  .result.ok { background: var(--green-bg); border-color: var(--green); color: var(--cream); }
  .result.err { background: var(--red-bg); border-color: var(--red); color: #fca5a5; }
  .result-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 600; color: var(--cream); margin-bottom: 6px; }
  .result-detail { font-size: 0.95rem; color: var(--text-muted); }
  .footer { text-align: center; margin-top: 32px; font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.06em; line-height: 1.6; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="brand">The Quarry</div>
    <div class="sub">Adjust Member Points</div>
  </div>

  <div class="card">
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="password" placeholder="Enter admin password" autocomplete="current-password">
    </div>
    <div class="field">
      <label>Member Email</label>
      <input type="email" id="memberEmail" placeholder="member@email.com" autocomplete="off">
    </div>
    <div class="field">
      <label>Delta (positive = add, negative = remove)</label>
      <input type="number" id="delta" placeholder="e.g. 100 or -50" step="1">
      <div class="delta-row" style="margin-top:8px">
        <button class="preset" type="button" data-d="50">+50</button>
        <button class="preset" type="button" data-d="100">+100</button>
        <button class="preset" type="button" data-d="250">+250</button>
        <button class="preset" type="button" data-d="500">+500</button>
        <button class="preset neg" type="button" data-d="-50">−50</button>
        <button class="preset neg" type="button" data-d="-100">−100</button>
      </div>
    </div>
    <div class="field">
      <label>Reason (required for audit)</label>
      <textarea id="note" placeholder="e.g. Forgot to scan receipt on 5/3 — credited manually"></textarea>
    </div>
    <button class="btn" id="submitBtn" onclick="submit()">Apply Adjustment</button>
  </div>

  <div id="result"></div>

  <div class="footer">
    Adjustments are logged with timestamp + reason in the member's history.<br>
    Adding points also adds to lifetime points; deductions only reduce the current balance.
  </div>
</div>

<script>
function $(id) { return document.getElementById(id); }
function escHtml(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

document.querySelectorAll('.preset').forEach((b) => {
  b.addEventListener('click', () => { $('delta').value = b.dataset.d; });
});

async function submit() {
  const btn = $('submitBtn');
  const result = $('result');
  const adminPassword = $('password').value.trim();
  const memberEmail = $('memberEmail').value.trim();
  const delta = parseInt($('delta').value, 10);
  const note = $('note').value.trim();

  if (!adminPassword || !memberEmail || !delta || !note) {
    result.innerHTML = '<div class="result err"><div class="result-name">Missing fields</div><div class="result-detail">All fields are required.</div></div>';
    return;
  }
  if (!confirm((delta > 0 ? 'Add ' : 'Remove ') + Math.abs(delta) + ' points ' + (delta > 0 ? 'to ' : 'from ') + memberEmail + '?')) return;

  btn.disabled = true; btn.textContent = 'Working…';
  result.innerHTML = '';

  try {
    const r = await fetch('/.netlify/functions/admin-adjust-points', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword, memberEmail, delta, note }),
    });
    const body = await r.json();
    if (!body.ok) throw new Error(body.error || 'HTTP ' + r.status);
    result.innerHTML =
      '<div class="result ok">' +
        '<div class="result-name">' + (delta > 0 ? '+' : '') + delta + ' pts</div>' +
        '<div class="result-detail">' + escHtml(body.memberEmail) + ' — new balance: <strong>' + body.newBalance.toLocaleString() + '</strong></div>' +
      '</div>';
    $('memberEmail').value = '';
    $('delta').value = '';
    $('note').value = '';
  } catch (e) {
    result.innerHTML = '<div class="result err"><div class="result-name">Failed</div><div class="result-detail">' + escHtml(e.message) + '</div></div>';
  } finally {
    btn.disabled = false; btn.textContent = 'Apply Adjustment';
  }
}

$('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('memberEmail').focus(); });
$('memberEmail').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('delta').focus(); });
</script>
</body>
</html>
